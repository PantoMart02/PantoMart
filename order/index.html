<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Order | PantoMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .order-container {
      max-width: 600px;
      margin: 80px auto;
    }
    .order-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }
    .order-item {
      display: flex;
      gap: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      margin-bottom: 24px;
    }
    .order-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }
    .order-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #e6f4ea;
      color: #137333;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <nav class="navbar container">
    <a href="/" class="brand-logo">
      <span class="brand-panto">Panto</span><span class="brand-suffix">Mart</span>
    </a>
  </nav>

  <div class="container order-container">
    <h1 class="mb-4 text-center">Order Confirmed</h1>
    
    <div class="order-card">
      <div class="order-meta">
        <span class="text-muted">Order #PM-98234</span>
        <span class="status-badge">Preparing for dispatch</span>
      </div>
      
      <div class="order-item">
        <img src="../615-SKUnIaL._SY879_.jpg" alt="Product">
        <div>
          <h3 style="font-size: 1.1rem; margin-bottom: 4px;">PantoMart Everyday Essential</h3>
          <p class="text-muted" style="font-size: 0.9rem;">Qty: 1</p>
        </div>
      </div>

      <div>
        <h4 class="mb-2">Tracking Information</h4>
        <p class="text-muted mb-3">Your tracking ID will be active once the courier scans the package.</p>
        <div style="background: var(--accent-soft); padding: 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
          <span style="font-family: monospace; font-size: 1.1rem;">DEL123456789</span>
          <a href="/track/" class="btn btn-soft" style="padding: 8px 16px; font-size: 0.9rem;">Track</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container text-center text-muted">
      <p>&copy; 2026 PantoMart. All rights reserved.</p>
    </div>
  </footer>
  <script src="../script.js"></script>
</body>
</html>
